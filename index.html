<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map with Rectangular Selection</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        :root{
            --bg: #f0f0f0;
            --panel: #ffffff;
            --border: rgba(0,0,0,0.12);
            --shadow: 0 10px 28px rgba(0,0,0,0.10);
        }
        body{
            background: #f0f0f0;
            padding: 1rem;
            font-family: monospace;
            margin: 0;
        }
        .layout{
            display: flex;
            gap: 1rem;
            align-items: stretch;
        }
        .map-col{
            flex: 1 1 65%;
            min-width: 360px;
        }
        .side-col{
            flex: 0 0 420px;
            max-width: 520px;
            width: 100%;
        }
        .card{
            background: var(--panel);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-radius: 10px;
            padding: 0.75rem;
        }
        #map {
            height: calc(100vh - 160px);
            min-height: 520px;
            border-radius: 10px;
            overflow: hidden;
        }
        textarea{
            width: 100%;
            min-height: 240px;
            box-sizing: border-box;
            resize: vertical;
        }
        label, select{
            display: block;
        }
        select{
            width: 100%;
            padding: 0.35rem 0.5rem;
            margin-top: 0.35rem;
        }
        .muted{
            opacity: 0.8;
            font-size: 0.9rem;
        }

        /* Leaflet search control */
        .leaflet-control.geocoder{
            background: rgba(255,255,255,0.95);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.14);
            padding: 6px;
            min-width: 260px;
        }
        .geocoder-row{
            display: flex;
            gap: 6px;
            align-items: center;
        }
        .geocoder-row input{
            flex: 1 1 auto;
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
        }
        .geocoder-row button{
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
        }
        .geocoder-results{
            margin-top: 6px;
            max-height: 160px;
            overflow: auto;
            border-top: 1px solid rgba(0,0,0,0.08);
            padding-top: 6px;
            display: none;
        }
        .geocoder-results button{
            width: 100%;
            text-align: left;
            background: transparent;
            border: 0;
            padding: 6px 4px;
            cursor: pointer;
        }
        .geocoder-results button:hover{
            background: rgba(0,0,0,0.05);
            border-radius: 6px;
        }

        @media (max-width: 980px){
            .layout{
                flex-direction: column;
            }
            .side-col{
                flex: 1 1 auto;
                max-width: none;
            }
            #map{
                height: 60vh;
                min-height: 420px;
            }
        }
    </style>
</head>
<body>
<h2>Use this page to generate your conf.json file</h2>
<h3>Chose your area using the map</h3>
<div class="layout">
    <div class="map-col">
        <div class="card">
            <div id="map"></div>
            <div class="muted" style="margin-top: 0.5rem;">Astuce: cliquez 2 fois pour définir le rectangle (NW puis SE). Un 3e clic réinitialise.</div>
        </div>
    </div>
    <div class="side-col">
        <div class="card">
            <label for="layer">Chose a type of map</label>
            <select name="map" id="layer">
                <option value="ign-scan-express">ign scan-express</option>
                <option value="ign-top25">ign top25</option>
                <option value="ign_v2">ign v2</option>
                <option value="openstreetmap">openstreetmap</option>
                <option value="orthophotos">orthophotos</option>
                <option value="strava">stravaheatmap</option>
            </select>

            <h3 style="margin-top: 1rem;">results</h3>
            <textarea name="json" id="json" cols="30" rows="10"></textarea>
            <p class="muted">save this as your conf.json file</p>
        </div>
    </div>
</div>
<script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([48.8566, 2.3522], 15); // Coordonnées pour centrer la carte (Paris, France)

    // Fond libre d'utilisation (OpenStreetMap Standard, ODbL) + attribution obligatoire
    var osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // Optional alternative (free to use, attribution required)
    var cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 20,
        subdomains: 'abcd',
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    });

    L.control.layers(
        { 'OSM Standard': osmStandard, 'CARTO Light': cartoLight },
        {},
        { position: 'topright' }
    ).addTo(map);

    var drawnRect = null;
    var firstCorner = null;
    var secondCorner = null;
    var bounds = [];

    // Simple place search using Nominatim (OpenStreetMap)
    // Note: Nominatim has usage policies; for heavy use, self-host or use a provider.
    var searchMarker = null;
    function createGeocoderControl(){
        var control = L.control({ position: 'topleft' });
        control.onAdd = function(){
            var container = L.DomUtil.create('div', 'leaflet-control geocoder');
            container.innerHTML = `
                <div class="geocoder-row">
                    <input id="geocoder-input" type="text" placeholder="Rechercher un lieu…" autocomplete="off" />
                    <button id="geocoder-go" type="button">Go</button>
                </div>
                <div id="geocoder-results" class="geocoder-results"></div>
            `;
            L.DomEvent.disableClickPropagation(container);
            L.DomEvent.disableScrollPropagation(container);
            return container;
        };
        return control;
    }

    function setGeocodeResults(results){
        var resultsEl = document.querySelector('#geocoder-results');
        resultsEl.innerHTML = '';
        if (!results || results.length === 0){
            resultsEl.style.display = 'none';
            return;
        }
        resultsEl.style.display = 'block';
        results.forEach(function(item){
            var btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = item.display_name;
            btn.addEventListener('click', function(){
                var lat = parseFloat(item.lat);
                var lon = parseFloat(item.lon);
                if (!isFinite(lat) || !isFinite(lon)){
                    return;
                }
                if (searchMarker){
                    map.removeLayer(searchMarker);
                }
                searchMarker = L.marker([lat, lon]).addTo(map);

                if (item.boundingbox && item.boundingbox.length === 4){
                    var south = parseFloat(item.boundingbox[0]);
                    var north = parseFloat(item.boundingbox[1]);
                    var west = parseFloat(item.boundingbox[2]);
                    var east = parseFloat(item.boundingbox[3]);
                    if ([south, north, west, east].every(isFinite)){
                        map.fitBounds([[south, west], [north, east]], { padding: [20, 20] });
                    }else{
                        map.setView([lat, lon], 15);
                    }
                }else{
                    map.setView([lat, lon], 15);
                }
                setGeocodeResults([]);
            });
            resultsEl.appendChild(btn);
        });
    }

    async function geocode(query){
        query = (query || '').trim();
        if (!query){
            setGeocodeResults([]);
            return;
        }
        try {
            var url = 'https://nominatim.openstreetmap.org/search?format=jsonv2&limit=6&q=' + encodeURIComponent(query);
            var res = await fetch(url, { headers: { 'Accept': 'application/json' } });
            if (!res.ok){
                setGeocodeResults([]);
                return;
            }
            var json = await res.json();
            setGeocodeResults(json);
        } catch (e){
            setGeocodeResults([]);
        }
    }

    createGeocoderControl().addTo(map);
    document.addEventListener('click', function(e){
        var resultsEl = document.querySelector('#geocoder-results');
        if (!resultsEl){
            return;
        }
        var controlEl = resultsEl.closest('.geocoder');
        if (controlEl && !controlEl.contains(e.target)){
            setGeocodeResults([]);
        }
    });
    document.querySelector('#geocoder-go').addEventListener('click', function(){
        geocode(document.querySelector('#geocoder-input').value);
    });
    document.querySelector('#geocoder-input').addEventListener('keydown', function(e){
        if (e.key === 'Enter'){
            e.preventDefault();
            geocode(e.target.value);
        }
        if (e.key === 'Escape'){
            setGeocodeResults([]);
            e.target.blur();
        }
    });

    map.on('click', function(e) {
        if (drawnRect) {
            map.removeLayer(drawnRect);
            map.removeLayer(firstCorner);
            map.removeLayer(secondCorner);
            bounds = [];
            drawnRect = null;
            firstCorner = null;
            secondCorner = null;
        }

        bounds.push(e.latlng);
        console.log(bounds);

        if (bounds.length === 2){
            let lBounds = L.latLngBounds(bounds[0],bounds[1]);
            console.log(lBounds);
            drawnRect = L.rectangle(bounds, {color: '#00ff78', weight: 1}).addTo(map);
            map.removeLayer(firstCorner);
            firstCorner = null;
            firstCorner = L.marker(lBounds.getNorthWest()).addTo(map);
            secondCorner = L.marker(lBounds.getSouthEast()).addTo(map);
            writeConf(lBounds);
        }

        if (bounds.length === 1)
            firstCorner = L.marker(bounds[0]).addTo(map);
    });

    function writeConf(lBounds){
        data = {
            "latTopLeft": lBounds.getNorthWest().lat,
            "lngTopLeft": lBounds.getNorthWest().lng ,
            "latBottomRight" : lBounds.getSouthEast().lat ,
            "lngBottomRight" : lBounds.getSouthEast().lng ,
            "settings" : document.querySelector("#layer").value
        }
        document.querySelector("#json").value = JSON.stringify(data);
    }

    document.querySelector("#layer").addEventListener('change',function (e){
        if (bounds.length === 2) {
            let lBounds = L.latLngBounds(bounds[0], bounds[1]);
            writeConf(lBounds);
        }
    });

</script>
</body>
</html>
